<figure>
	<video controls id="load_palette">
		<source src="_static/videos/Load_palette.mp4">
		<!-- <source src="downtown-los-angeles.webm"> -->
		<track kind="chapters" label="Locations" src="_static/videos/Load_palette.vtt" srclang="en" default>
	</video>

	<!-- Trigger/Open The Modal -->
	<button id="myBtn5" style="float: right" onclick="myBtn5Click()">Click to see a larger video</button>

</figure>

<!-- The Modal -->
<div id="myModal5" class="modal">

  <!-- Modal content -->
	<figure class="modal-content">
		<button class="close" onclick="span5Click()">close &times;</button>
		<video controls id="load_palette_modal">
			<source src="_static/videos/Load_palette.mp4">
			<!-- <source src="downtown-los-angeles.webm"> -->
			<track kind="chapters" label="Locations" src="_static/videos/Load_palette.vtt" srclang="en" default>
		</video>
	</figure>

<script>
var video5 = document.getElementById("load_palette"),
video5m = document.getElementById("load_palette_modal");

all_videos.push([locationList5m, video5m, trackElement5m]);

// Get the modal
var modal5 = document.getElementById("myModal5");

// When the user clicks on the button, open the modal
function myBtn5Click() {
	video5.pause();
  	modal5.style.display = "block";
}

// When the user clicks on <span> (x), close the modal
function span5Click() {
	video5m.pause();
  	modal5.style.display = "none";
}

// When the user clicks anywhere outside of the modal, close it
window.onclick = function(event) {
  if (event.target == modal5) {
		video5m.pause();
    modal5.style.display = "none";
  }
}

</script>
