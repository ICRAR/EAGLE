server {
# redirect http to https
    listen 80;
    server_name  eagle.icrar.org;
    return 301 https://icrar.eagle.org$request_uri;
}
server {
    listen       443 ssl;
    # the cloudflare cert and key need to be installed.
    ssl_certificate     /etc/pki/tls/certs/cloudflare-20350829-eagle-icrar-org.crt;
    ssl_certificate_key /etc/pki/tls/private/cloudflare-20350829-eagle-icrar-org.key;
    ssl_protocols       TLSv1 TLSv1.1 TLSv1.2;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    server_name  eagle.icrar.org;

    location / {
      proxy_pass http://0.0.0.0:8888;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Host $host;
      proxy_redirect off;
    }
}