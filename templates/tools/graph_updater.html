<!-- Graph Updater Modal -->
<div class="modal fade" id="graphUpdaterModal" tabindex="-1" role="dialog" aria-labelledby="graphUpdaterModalTitle">
    <div class="modal-dialog modal-dialog-centered modal-lg" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="graphUpdaterModalTitle">Graph Updater</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="container">
                    <div class="row">
                        <div class="col-3">
                            <p>Source Repository:</p>
                        </div>
                        <div class="col">
                            <div class="form-group">
                                <select class="form-control" id="graphUpdaterModalSourceRepositorySelect">
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="row" data-bind="visible: !GraphUpdater.isFetching() && !GraphUpdater.hasFetched()">
                        <div class="col">
                            <div class="d-grid gap-2">
                                <button type="button" class="btn btn-primary" id="graphUpdaterModalUpdateButton" data-bind="click: function(){GraphUpdater.update()}">
                                    Update
                                </button>
                            </div>
                        </div>
                    </div>
                    <!-- ko if: GraphUpdater.isFetching() -->
                        {% include 'modals/loading_spinner.html' %}
                    <!-- /ko -->
                    <div class="row" data-bind="visible: GraphUpdater.isUpdating() || GraphUpdater.hasUpdated()">
                        <div class="col">
                            <table id="graphUpdaterModalGraphTable" class="table table-striped table-bordered table-hover">
                                <thead>
                                    <tr>
                                        <th scope="col">Graph</th>
                                        <th scope="col">Updated</th>
                                    </tr>
                                </thead>
                                <tbody id="graphUpdaterModalGraphTableBody" data-bind="foreach: GraphUpdater.updatedLogicalGraphs">
                                    <tr>
                                        <td data-bind="text: file().pathAndName()"></td>
                                        <td data-bind="text: lg() ? 'Yes' : 'No'"></td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <div class="row" data-bind="visible: GraphUpdater.hasUpdated()">
                        <div class="col-3">
                            <p>Destination Repository:</p>
                        </div>
                        <div class="col">
                            <div class="form-group">
                                <select class="form-control" id="graphUpdaterModalDestinationRepositorySelect">
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="row" data-bind="visible: GraphUpdater.hasUpdated()">
                        <div class="col">
                            <div class="d-grid gap-2">
                                <button type="button" class="btn btn-primary" id="graphUpdaterModalPushButton" data-bind="click: function(){GraphUpdater.push()}">
                                    Push
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
