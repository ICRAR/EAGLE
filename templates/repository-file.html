<div class="repoIndent repoFile">
    <div class="row">
        <div class="col col-1">
            <!-- ko if: isFetching -->
            <div class="spinner-border spinner-border-sm" role="status">
            </div>
            <!-- /ko -->
            <!-- ko ifnot: isFetching -->
            <i class="material-symbols-outlined md-18" data-bind="text: getIconUrl"></i>
            <!-- /ko -->
        </div>
        <div class="col col-10">
            <a href="#" data-bind="click: Repositories.selectFile, attr: {id: htmlId}, eagleTooltip: '|||' + $data.name + '|||'" data-bs-placement="left">
                <span data-bind="text: $data.name"></span>
            </a>
        </div>
        <!-- ko if: getIconUrl() === "device_hub" || type === Eagle.FileType.Daliuge || type === Eagle.FileType.Graph || type === Eagle.FileType.Palette -->
        <div class="col col-1 repo-actions dropdown">
            <button type="button" class="material-symbols-outlined md-18 dropdown-toggle dropdown-control repoTripleDot iconHoverEffect" data-bs-toggle="dropdown">more_vert</button>
            <div class="dropdown-menu dropdown-area">
                <!-- ko if: getIconUrl() === "device_hub" -->
                <a href="#" data-bind="click: $root.insertRemoteFile, attr: {id: htmlId() + '-insert'}"><span>Insert</span></a>
                <!-- /ko -->
                <!-- ko if: type === Eagle.FileType.Daliuge || type === Eagle.FileType.Graph || type === Eagle.FileType.Palette -->
                <a href="#" data-bind="click: $root.deleteRemoteFile, attr: {id: htmlId() + '-delete'}"><span>Delete</span></a>
                <!-- /ko -->
            </div>
        </div>
        <!-- /ko -->
    </div>
</div>
